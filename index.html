<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geometry Area Calculator</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 480px; margin: 60px auto; padding: 20px; }
  h1 { font-size: 22px; }
  label { display: block; margin-top: 12px; font-weight: bold; }
  select, input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
  button { margin-top: 18px; padding: 10px 16px; background: #0078D4; color: white; border: none; border-radius: 4px; cursor: pointer; }
  #result { margin-top: 20px; font-size: 18px; font-weight: bold; }
  .dim { display: none; }
</style>
</head>
<body>
  <h1>Geometry Area Calculator</h1>

  <label for="shape">Shape</label>
  <select id="shape" onchange="updateFields()">
    <option value="circle">Circle</option>
    <option value="rectangle">Rectangle</option>
    <option value="triangle">Triangle</option>
  </select>

  <div id="field-radius" class="dim">
    <label for="radius">Radius</label>
    <input type="number" id="radius" step="any">
  </div>

  <div id="field-width" class="dim">
    <label for="width">Width</label>
    <input type="number" id="width" step="any">
  </div>

  <div id="field-height" class="dim">
    <label for="height">Height</label>
    <input type="number" id="height" step="any">
  </div>

  <div id="field-base" class="dim">
    <label for="base">Base</label>
    <input type="number" id="base" step="any">
  </div>

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <script>
    // IMPORTANT: replace with your actual Azure Function URL once created (Phase 2)
    const API_URL = "https://YOUR-FUNCTION-APP-NAME.azurewebsites.net/api/CalculateArea";

    function updateFields() {
      const shape = document.getElementById('shape').value;
      document.querySelectorAll('.dim').forEach(el => el.style.display = 'none');
      if (shape === 'circle') {
        document.getElementById('field-radius').style.display = 'block';
      } else if (shape === 'rectangle') {
        document.getElementById('field-width').style.display = 'block';
        document.getElementById('field-height').style.display = 'block';
      } else if (shape === 'triangle') {
        document.getElementById('field-base').style.display = 'block';
        document.getElementById('field-height').style.display = 'block';
      }
    }

    async function calculate() {
      const shape = document.getElementById('shape').value;
      const payload = { shape: shape };

      if (shape === 'circle') {
        payload.radius = parseFloat(document.getElementById('radius').value);
      } else if (shape === 'rectangle') {
        payload.width = parseFloat(document.getElementById('width').value);
        payload.height = parseFloat(document.getElementById('height').value);
      } else if (shape === 'triangle') {
        payload.base = parseFloat(document.getElementById('base').value);
        payload.height = parseFloat(document.getElementById('height').value);
      }

      document.getElementById('result').innerText = "Calculating...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        document.getElementById('result').innerText = "Area: " + data.area;
      } catch (err) {
        document.getElementById('result').innerText = "Error: could not reach backend. " + err;
      }
    }

    updateFields();
  </script>
</body>
</html>
